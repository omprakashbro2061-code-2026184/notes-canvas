name: Build MyCanvas APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - uses: android-actions/setup-android@v3

      - name: Accept licenses + install tools
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Install deps
        run: npm install

      - name: Build React
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Verify dist
        run: ls -la dist/ && head -3 dist/index.html

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli@5

      - name: Add Android
        run: rm -rf android && npx cap add android

      - name: Copy + Sync
        run: npx cap copy android && npx cap sync android

      - name: Verify assets
        run: ls android/app/src/main/assets/public/ | head -8

      - name: Enable touch in WebView (patch AndroidManifest)
        run: |
          cd android/app/src/main
          # Add hardware acceleration
          sed -i 's/android:hardwareAccelerated="false"/android:hardwareAccelerated="true"/' AndroidManifest.xml || true
          # Ensure hardwareAccelerated is set
          if ! grep -q "hardwareAccelerated" AndroidManifest.xml; then
            sed -i 's/<activity/<activity android:hardwareAccelerated="true"/' AndroidManifest.xml
          fi
          cat AndroidManifest.xml | grep -A2 "activity"

      - name: Fix app name
        run: |
          sed -i 's|<string name="app_name">.*</string>|<string name="app_name">MyCanvas</string>|' \
            android/app/src/main/res/values/strings.xml || true

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Find APK
        run: |
          APK=$(find android -name "*.apk" | head -1)
          echo "Found: $APK"
          NAME="MyCanvas-v${{ github.run_number }}.apk"
          cp "$APK" "$NAME"
          echo "APK_NAME=$NAME" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: ${{ env.APK_NAME }}
          retention-days: 90

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.0.${{ github.run_number }}
          name: "MyCanvas v2.0.${{ github.run_number }}"
          body: |
            ## 📱 MyCanvas — Download & Install

            **Download the APK file below ↓**

            ### Install steps:
            1. Download `MyCanvas-v${{ github.run_number }}.apk`
            2. On Android: Settings → Security → Unknown sources → ON
            3. Open the APK → Install → Open!

            ### Fixes in this build:
            - ✅ Drawing tools work on touch (pen/marker/highlighter)
            - ✅ Double-tap sticky note to type inside
            - ✅ All shapes place on tap
            - ✅ Data saves to device storage
            - ✅ New app logo
            - ✅ 72 kawaii stickers in 6 packs
            - ✅ Group / Ungroup objects
            - ✅ Export PNG downloads to device
          files: ${{ env.APK_NAME }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
