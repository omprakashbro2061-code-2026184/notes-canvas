name: Build MyCanvas APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses + install tools
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Install dependencies
        run: npm install

      - name: Build React app
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Verify dist
        run: |
          echo "--- dist contents ---"
          ls -la dist/
          echo "--- index.html head ---"
          head -5 dist/index.html

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli@5

      - name: Add Android platform
        run: |
          rm -rf android
          npx cap add android

      - name: Copy + Sync assets
        run: |
          npx cap copy android
          npx cap sync android

      - name: Verify assets in Android
        run: |
          echo "--- Android assets ---"
          ls android/app/src/main/assets/public/ | head -10

      - name: Fix Android strings (app name)
        run: |
          sed -i 's/<string name="app_name">.*<\/string>/<string name="app_name">MyCanvas<\/string>/' \
            android/app/src/main/res/values/strings.xml || true

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Locate & rename APK
        run: |
          APK=$(find android -name "*.apk" | head -1)
          echo "Found: $APK"
          NAME="MyCanvas-v${{ github.run_number }}.apk"
          cp "$APK" "$NAME"
          echo "APK_NAME=$NAME" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: ${{ env.APK_NAME }}
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.0.${{ github.run_number }}
          name: "MyCanvas v2.0.${{ github.run_number }}"
          body: |
            ## 📱 MyCanvas APK

            ### Install:
            1. Download APK below ↓
            2. Android: Settings → Security → Unknown sources → ON
            3. Open APK → Install → Done!

            ### What's new in v2:
            - ✅ 3 screens: Home (files) · Canvas · Settings
            - ✅ All tools labeled with names
            - ✅ AMOLED true black theme
            - ✅ Real SVG clip art stickers + Emoji tab
            - ✅ Bottom sheet panels (no more disappearing)
            - ✅ Sticky notes — tap to write inside
            - ✅ Canvas file manager with thumbnails
            - ✅ Save / rename / delete canvases
            - ✅ Export PNG
            - ✅ Fully offline · No tracking
          files: ${{ env.APK_NAME }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
